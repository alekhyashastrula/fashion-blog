<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <!-- Woman in saree silhouette -->
  <defs>
    <linearGradient id="sareeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1A4A"/>
      <stop offset="50%" style="stop-color:#C94080"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
    <linearGradient id="palluGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#D4956B"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#3d2b3d"/>
    </linearGradient>
  </defs>

  <!-- Hair flowing -->
  <path d="M38 8 C38 4, 42 2, 45 4 C48 6, 50 5, 50 8 C52 6, 55 8, 54 12 C56 10, 58 13, 56 16 C58 15, 59 18, 56 20 C53 22, 48 18, 45 16 C42 14, 38 12, 38 8Z" fill="url(#hairGrad)"/>

  <!-- Head -->
  <ellipse cx="44" cy="14" rx="6" ry="7" fill="#D4956B"/>

  <!-- Hair on head -->
  <path d="M38 12 C38 8, 42 6, 45 7 C48 8, 50 8, 50 12 C49 10, 45 9, 42 10 C40 11, 38 12, 38 12Z" fill="url(#hairGrad)"/>

  <!-- Neck -->
  <path d="M42 20 L46 20 L45 24 L43 24Z" fill="#D4956B"/>

  <!-- Body/Saree -->
  <path d="M35 24 C38 22, 48 22, 52 24 C54 28, 54 35, 52 42 C50 50, 48 58, 46 65 C44 72, 42 78, 40 85 C38 88, 36 90, 34 88 C32 85, 30 78, 30 70 C30 62, 32 50, 34 42 C35 36, 35 30, 35 24Z" fill="url(#sareeGrad)"/>

  <!-- Pallu draping -->
  <path d="M52 24 C56 22, 60 26, 58 32 C56 38, 52 44, 48 50 C44 56, 40 60, 38 58 C40 54, 44 48, 48 42 C52 36, 54 30, 52 24Z" fill="url(#palluGrad)" opacity="0.85"/>

  <!-- Pallu flowing end -->
  <path d="M58 32 C62 28, 66 30, 64 36 C62 40, 58 42, 56 38 C55 36, 56 34, 58 32Z" fill="url(#palluGrad)" opacity="0.6"/>

  <!-- Left arm -->
  <path d="M35 30 C30 32, 26 36, 24 40 C22 42, 24 44, 26 42 C28 40, 30 36, 34 34Z" fill="#D4956B"/>

  <!-- Right arm holding pallu -->
  <path d="M50 28 C52 30, 50 34, 48 36 C47 37, 48 35, 50 32Z" fill="#D4956B"/>

  <!-- Saree bottom flow -->
  <path d="M34 88 C32 92, 28 95, 26 94 C24 92, 26 88, 30 86 C32 85, 34 86, 34 88Z" fill="url(#sareeGrad)" opacity="0.7"/>

  <!-- Decorative swirl left -->
  <path d="M20 70 C16 66, 14 72, 18 74 C22 76, 24 72, 22 68 C20 64, 16 66, 18 70" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.6"/>

  <!-- Decorative swirl right -->
  <path d="M60 70 C64 66, 66 72, 62 74 C58 76, 56 72, 58 68 C60 64, 64 66, 62 70" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.6"/>

  <!-- Small decorative dots -->
  <circle cx="18" cy="76" r="1" fill="#c9a96e" opacity="0.5"/>
  <circle cx="62" cy="76" r="1" fill="#c9a96e" opacity="0.5"/>
  <circle cx="16" cy="68" r="0.8" fill="#8B1A4A" opacity="0.4"/>
  <circle cx="64" cy="68" r="0.8" fill="#8B1A4A" opacity="0.4"/>
</svg>
